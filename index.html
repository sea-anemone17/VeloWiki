<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VeloWiki</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <button id="sidebarToggle" class="icon-btn mobile-only" aria-label="사이드바 열기">☰</button>
      <a class="brand" href="#/study/page/홈" aria-label="VeloWiki 홈으로 이동">
        <span class="brand-mark">V</span>
        <span><strong>VeloWiki</strong><small>Personal knowledge wiki</small></span>
      </a>
      <nav class="space-tabs" aria-label="공간 전환">
        <a id="studyTab" href="#/study/page/홈">개념</a>
        <a id="profileTab" href="#/profile/page/프로필 홈">프로필</a>
        <a id="specialTab" href="#/special/wanted">특수</a>
      </nav>
      <label class="search-box" aria-label="문서 검색">
        <span>⌕</span><input id="searchInput" type="search" placeholder="현재 공간에서 검색..." autocomplete="off" />
      </label>
      <div class="topbar-actions">
        <button id="randomPageBtn" class="ghost-btn" type="button">랜덤 문서</button>
        <button id="newPageBtn" class="primary-btn" type="button">+ 새 문서</button>
      </div>
    </header>

    <main class="layout">
      <aside id="sidebar" class="sidebar">
        <section class="panel">
          <div class="panel-head"><h2 id="spaceListTitle">문서</h2><span id="pageCount" class="pill">0</span></div>
          <nav id="pageList" class="nav-list" aria-label="문서 목록"></nav>
        </section>
        <section class="panel">
          <div class="panel-head"><h2>최근 수정</h2></div>
          <nav id="recentList" class="nav-list compact" aria-label="최근 수정 문서"></nav>
        </section>
        <section class="panel">
          <div class="panel-head"><h2>분류</h2></div>
          <nav id="categoryList" class="tag-list" aria-label="분류 목록"></nav>
        </section>
      </aside>

      <section class="workspace">
        <div id="notice" class="notice hidden" role="status"></div>
        <article class="document-card">
          <header class="document-head">
            <div>
              <p id="breadcrumb" class="breadcrumb"></p>
              <h1 id="pageTitle">홈</h1>
              <p id="pageMeta" class="page-meta"></p>
            </div>
            <div class="document-actions">
              <button id="editBtn" class="ghost-btn" type="button">수정</button>
              <button id="deleteBtn" class="ghost-btn" type="button">삭제</button>
              <button id="saveBtn" class="primary-btn hidden" type="button">저장</button>
              <button id="cancelBtn" class="ghost-btn hidden" type="button">취소</button>
            </div>
          </header>
          <nav id="pageTabs" class="page-tabs hidden" aria-label="문서 탭"></nav>
          <section id="viewer" class="wiki-view"></section>
          <section id="editorWrap" class="editor-wrap hidden" aria-label="문서 편집기">
            <div class="field-grid">
              <label class="field"><span>문서 제목</span><input id="titleInput" type="text" /></label>
              <label class="field"><span>공간</span><select id="spaceInput"><option value="study">개념</option><option value="profile">프로필</option></select></label>
            </div>
            <label class="field"><span>본문</span><textarea id="contentInput" spellcheck="false"></textarea></label>
            <p class="help-text">링크: <code>[[문서명]]</code>, 다른 공간: <code>[[프로필:문서명]]</code>, <code>[[개념:문서명]]</code>, 분류: <code>[[분류:수학]]</code>, 주석: <code>[^1]</code>, 이미지: <code>{{image:URL|캡션}}</code></p>
          </section>
        </article>
      </section>

      <aside class="rightbar">
        <section class="panel">
          <div class="panel-head"><h2>문서 정보</h2></div>
          <div id="pageInfo" class="info-list"></div>
        </section>
        <section class="panel">
          <div class="panel-head"><h2>특수 문서</h2></div>
          <nav class="nav-list compact special-links">
            <a href="#/special/wanted">특수:필요문서</a>
            <a href="#/special/orphan">특수:고립문서</a>
            <a href="#/special/recent">특수:최근변경</a>
            <a href="#/special/categories">특수:분류목록</a>
          </nav>
        </section>
      </aside>
    </main>
  </div>
  <template id="emptyListTemplate"><p class="empty">아직 없습니다.</p></template>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
